<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio y Video Circuito ER2</title>
    <link rel="stylesheet" href="styles.css?v=31.0">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- QR Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <button id="menuBtn" class="menu-btn"><span class="material-icons">menu</span></button>
            <h1 class="nav-title" id="activeModeDisplay">Armado</h1>
            <div style="display:flex; gap: 0.5rem; margin-left: auto;">
                <span class="material-icons" id="offlineIcon" style="display:none; color: var(--danger); line-height: inherit; align-self: center;" title="Sin Conexión">cloud_off</span>
                <button class="qr-btn" id="qrStartBtn" title="Escanear QR" style="width:auto; padding:0.4rem; border-radius:8px;"><span class="material-icons">qr_code_scanner</span></button>
                <button class="qr-btn" id="searchToggleBtn" title="Buscar" style="width:auto; padding:0.4rem; border-radius:8px;"><span class="material-icons">search</span></button>
            </div>
        </div>
    </nav>

    <div id="sideMenu" class="side-menu">
        <div class="side-menu-content">
            <div class="side-menu-header">
                <h2>Audio y video ER2</h2>
                <button id="closeMenuBtn" class="close-btn"><span class="material-icons">close</span></button>
            </div>
            <div class="menu-section">
                <h3>Vistas</h3>
                <button class="menu-item" onclick="setMode('OPERACION')"><span class="material-icons">build_circle</span> Operación</button>
                <button class="menu-item" onclick="setMode('ADMIN')"><span class="material-icons">admin_panel_settings</span> Administración</button>
                <button class="menu-item" onclick="shareApp()"><span class="material-icons">share</span> Compartir</button>
            </div>
            <div class="menu-section">
                <h3>Referencias</h3>
                <a href="https://github.com/entrerios2/entrerios2.github.io/tree/main/Especificaciones_Instalacion" target="_blank" class="menu-item"><span class="material-icons">map</span> Diagramas</a>
                <a href="https://github.com/entrerios2/entrerios2.github.io/tree/main/Manuales" target="_blank" class="menu-item"><span class="material-icons">description</span> Manuales</a>
            </div>
        </div>
    </div>

    <div class="desktop-wrapper">
        <main class="container">
            <!-- QR Scanner Modal -->
            <div id="qrModal" class="modal-overlay" style="display:none; z-index: 3000;">
                <div class="modal-content glass" style="max-width: 500px; padding: 1rem;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                        <h3 style="margin:0; color:var(--accent-cyan);">Escanear Código QR</h3>
                        <button id="closeQrBtn" class="close-btn" style="position:static;"><span class="material-icons">close</span></button>
                    </div>
                    <div id="reader" style="width:100%; border-radius: 12px; overflow:hidden;"></div>
                </div>
            </div>

            <!-- Search Section -->
            <div class="search-container" id="searchContainer" style="display: none; transition: all 0.3s ease;">
                <input type="text" id="searchInput" placeholder="Busca ID o Nombre..." autocomplete="off">
            </div>

            <!-- Admin Panel -->
            <div id="adminPanel" style="display: none;">
                <div class="admin-tabs" style="display:none;"> <!-- Hidden because of mirror mode -->
                    <button class="tab-btn active" onclick="showAdminTab('tabEquipo', this)">Equipos</button>
                    <button class="tab-btn" onclick="showAdminTab('tabCable', this)">Cables</button>
                    <button class="tab-btn" onclick="showAdminTab('tabRuteo', this)">Ruteo</button>
                </div>

                <div id="adminInventoryContainer">
                    <!-- Se inyectará el mismo inventario que Operación pero con clics a edición -->
                </div>

                <!-- Admin Modal Overlay -->
                <div id="adminModal" class="modal-overlay" style="display: none;">
                    <div class="modal-content admin-modal">
                        <button class="close-modal-btn" onclick="closeAdminModal()"><span class="material-icons">close</span></button>
                        <div id="formContainerInner"></div>
                    </div>
                </div>

                <!-- Tables -->
                <div class="table-responsive">
                    <table id="adminTable">
                        <thead id="adminTableHead"></thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Results Section (Tree) -->
            <div id="resultsContainer"></div>
        </main>
    </div>

    <!-- Hidden original forms to be moved dynamically -->
    <div style="display: none;">
        <datalist id="list_categorias"></datalist>
        <datalist id="list_ubicaciones"></datalist>
        <datalist id="list_propietarios"></datalist>
        <datalist id="list_lugares"></datalist>
        <datalist id="list_conectores"></datalist>

        <form id="formEquipo" class="admin-tab-content">
            <input type="hidden" name="isEdit" value="false">
            <div class="form-group"><label>ID del Equipo</label><input type="text" name="id" id="equip_id" placeholder="ej: XR-01" required></div>
            <div class="form-group"><label>Nombre / Modelo</label><input type="text" name="nombre" id="equip_nombre" placeholder="ej: Consola XR12" required></div>
            <div class="form-group"><label>Categoría</label><input type="text" name="categoria" id="equip_cat" list="list_categorias" placeholder="ej: Audio"></div>
            <div class="form-group"><label>Ubicación de Uso</label><input type="text" name="ubicacion" list="list_ubicaciones" placeholder="ej: FOH"></div>
            <div class="form-group"><label>Propietario</label><input type="text" name="propietario" list="list_propietarios" placeholder="ej: Propio"></div>
            <div class="form-group"><label>Contenedor (Lugar de guardado)</label><input type="text" name="lugar" list="list_lugares" placeholder="ej: Rack 1"></div>
            <div class="form-group" style="grid-column: 1 / -1;"><label>Notas</label><input type="text" name="notas" placeholder="Observaciones adicionales"></div>
            <button type="submit" id="btnSubmitEquipo" class="action-btn btn-primary">Guardar Equipo</button>
        </form>

        <form id="formCable" class="admin-tab-content">
            <input type="hidden" name="isEdit" value="false">
            <div class="form-group"><label>ID del Cable</label><input type="text" name="id" id="cable_id" placeholder="ej: CBL-001" required></div>
            <div class="form-group"><label>Tipo de Conector</label><input type="text" name="tipo" id="cable_tipo" list="list_conectores" placeholder="ej: XLR M-F"></div>
            <div class="form-group"><label>Longitud (m)</label><input type="number" name="longitud" placeholder="ej: 10"></div>
            <div class="form-group"><label>Propietario</label><input type="text" name="propietario" list="list_propietarios" placeholder="Propietario"></div>
            <div class="form-group"><label>Contenedor</label><input type="text" name="lugar" list="list_lugares" placeholder="Contenedor"></div>
            <div class="form-group" style="grid-column: 1 / -1;"><label>Notas</label><input type="text" name="notas" placeholder="Observaciones"></div>
            <button type="submit" id="btnSubmitCable" class="action-btn btn-primary">Guardar Cable</button>
        </form>

        <form id="formRuteo" class="admin-tab-content">
            <input type="hidden" name="isEdit" value="false">
            <div class="form-group"><label>ID Patch</label><input type="text" name="id_patch" placeholder="ej: 001" required></div>
            <div class="form-group"><label>Equipo Origen</label><select name="id_origen" id="selectOrigen" required><option value="">-- Seleccionar --</option></select></div>
            <div class="form-group"><label>Puerto Origen</label><input type="text" name="puerto_origen" placeholder="ej: XLR"></div>
            <div class="form-group"><label>Equipo Destino</label><select name="id_destino" id="selectDestino" required><option value="">-- Seleccionar --</option></select></div>
            <div class="form-group"><label>Puerto Destino</label><input type="text" name="puerto_destino" placeholder="ej: Input 1"></div>
            <div class="form-group"><label>Tipo de Señal</label><input type="text" name="tipo_senial" placeholder="ej: Audio"></div>
            <button type="submit" id="btnSubmitRuteo" class="action-btn btn-primary" style="grid-column: 1 / -1;">Guardar Conexión</button>
        </form>
    </div>

    <!-- Setup Modal -->
    <style>
    .setup-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    .setup-content { max-width: 400px; width: 100%; background: #1e1e1e; padding: 1.5rem; border-radius: 12px; border: 1px solid #333;}
    </style>
    <div id="setupModal" class="setup-modal" style="display: none;">
        <div class="setup-content">
            <h3 style="margin-top:0">Conectar Base de Datos</h3>
            <p style="font-size: 0.9rem; margin-bottom: 1rem; color:#aaa;">Ingresá el ID de tu Google Apps Script o la URL completa:</p>
            <input type="text" id="gasIdInput" placeholder="AKfycb..." style="width:100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; margin-bottom: 1rem;">
            <button id="saveGasIdBtn" class="mode-btn active" style="width:100%; padding: 0.8rem; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Guardar e Iniciar</button>
        </div>
    </div>

    <!-- Floating Mode Toggle REMOVED -->

    <script src="app.js?v=31.0"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
