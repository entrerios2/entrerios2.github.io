<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circuito AV Tech</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- QR Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="offline-status">MODO OFFLINE ACTIVADO</div>

    <nav class="navbar">
        <div class="nav-content">
            <button id="menuBtn" class="menu-btn">☰</button>
            <h1 class="nav-title">Circuito AV Tech</h1>
            <div id="activeModeDisplay" class="mode-indicator">ARMADO</div>
        </div>
    </nav>

    <!-- Sidebar Menu -->
    <div id="sideMenu" class="side-menu">
        <div class="side-menu-content">
            <div class="side-menu-header">
                <h2>Menú</h2>
                <button id="closeMenuBtn" class="close-btn">&times;</button>
            </div>
            <div class="menu-section">
                <h3>Modos</h3>
                <button class="menu-item" onclick="setMode('ARMADO')">📍 Modo Armado</button>
                <button class="menu-item" onclick="setMode('DESARME')">📦 Modo Desarme</button>
                <button class="menu-item" onclick="setMode('ADMIN')">⚙️ Modo Admin</button>
            </div>
            <div class="menu-section">
                <h3>Referencias</h3>
                <a href="https://github.com/entrerios2/entrerios2.github.io/tree/main/Especificaciones_Instalacion" target="_blank" class="menu-item">📐 Diagramas</a>
                <a href="https://github.com/entrerios2/entrerios2.github.io/tree/main/Manuales" target="_blank" class="menu-item">📖 Manuales</a>
            </div>
            <div class="menu-section">
                <h3>Acciones</h3>
                <button class="menu-item" onclick="shareApp()">🔗 Compartir App</button>
            </div>
        </div>
    </div>
    <main class="container">
        <!-- QR Reader Container -->
        <div id="reader"></div>

        <!-- Search Section -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Busca ID de equipo o cable..." autocomplete="off">
            <button class="qr-btn" id="qrStartBtn" title="Escanear QR">📸</button>
        </div>

        <!-- Admin Panel (Hidden by default) -->
        <div id="adminPanel" style="display: none;">
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="showAdminTab('tabEquipo', this)">Equipo</button>
                <button class="tab-btn" onclick="showAdminTab('tabCable', this)">Cable</button>
                <button class="tab-btn" onclick="showAdminTab('tabRuteo', this)">Ruteo</button>
            </div>

            <!-- Form Equipo -->
            <form id="formEquipo" class="admin-tab-content">
                <input type="text" name="id" id="equip_id" placeholder="ID (ej: XR-01)" required>
                <input type="text" name="nombre" id="equip_nombre" placeholder="Nombre (ej: Consola XR12)" required>
                <input type="text" name="categoria" id="equip_cat" list="list_categorias" placeholder="Categoría (ej: Audio)">
                <input type="text" name="ubicacion" list="list_ubicaciones" placeholder="Ubicación (ej: FOH)">
                <input type="text" name="propietario" list="list_propietarios" placeholder="Propietario (ej: Propio)">
                <input type="text" name="lugar" list="list_lugares" placeholder="Lugar Guardado (ej: Rack 1)">
                <input type="text" name="notas" placeholder="Notas">
                <button type="submit" class="action-btn btn-primary">Guardar Equipo</button>
            </form>

            <!-- Form Cable -->
            <form id="formCable" class="admin-tab-content" style="display: none;">
                <input type="text" name="id" id="cable_id" placeholder="ID (ej: CBL-001)" required>
                <input type="text" name="tipo" id="cable_tipo" list="list_conectores" placeholder="Tipo Conector (ej: XLR M-F)">
                <input type="number" name="longitud" placeholder="Longitud (m)">
                <input type="text" name="propietario" list="list_propietarios" placeholder="Propietario">
                <input type="text" name="lugar" list="list_lugares" placeholder="Lugar Guardado">
                <input type="text" name="notas" placeholder="Notas">
                <button type="submit" class="action-btn btn-primary">Guardar Cable</button>
            </form>

            <datalist id="list_categorias"></datalist>
            <datalist id="list_ubicaciones"></datalist>
            <datalist id="list_propietarios"></datalist>
            <datalist id="list_lugares"></datalist>
            <datalist id="list_conectores"></datalist>

            <!-- Form Ruteo -->
            <form id="formRuteo" class="admin-tab-content" style="display: none;">
                <input type="text" name="id_patch" placeholder="ID Patch (ej: 001)" required>
                <select name="id_origen" id="selectOrigen" required>
                    <option value="">-- Seleccionar Origen --</option>
                </select>
                <input type="text" name="puerto_origen" placeholder="Puerto Origen (ej: XLR)">
                <select name="id_destino" id="selectDestino" required>
                    <option value="">-- Seleccionar Destino --</option>
                </select>
                <input type="text" name="puerto_destino" placeholder="Puerto Destino (ej: Input 1)">
                <input type="text" name="tipo_senial" placeholder="Tipo Señal (ej: Audio)">
                <button type="submit" class="action-btn btn-primary">Guardar Ruteo</button>
            </form>
        </div>

        <!-- Results Section -->
        <div id="resultsContainer">
            <!-- Dynamic cards will be injected here -->
        </div>
    </main>

    <!-- Setup Modal -->
    <style>
    .setup-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    .setup-content { max-width: 400px; width: 100%; background: #1e1e1e; padding: 1.5rem; border-radius: 12px; border: 1px solid #333;}
    </style>
    <div id="setupModal" class="setup-modal" style="display: none;">
        <div class="setup-content">
            <h3 style="margin-top:0">Conectar Base de Datos</h3>
            <p style="font-size: 0.9rem; margin-bottom: 1rem; color:#aaa;">Ingresá el ID de tu Google Apps Script o la URL completa:</p>
            <input type="text" id="gasIdInput" placeholder="AKfycb..." style="width:100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; margin-bottom: 1rem;">
            <button id="saveGasIdBtn" class="mode-btn active" style="width:100%; padding: 0.8rem; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Guardar e Iniciar</button>
        </div>
    </div>

    <!-- Floating Mode Toggle REMOVED -->

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
